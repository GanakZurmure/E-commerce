<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow">

        <a class="navbar-brand" href="index.html">Aqua Store</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="products.html">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="category.html">Category</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>

            </ul>

            <div class="search mr-3">
                <a href="search.html" class="btn btn-sm btn-outline-primary">
                    Search
                </a>
            </div>

            <div class="cart">
                <a href="cart.html">
                    <i class="fas fa-shopping-cart fa-1x text-dark"></i>
                </a>
            </div>

        </div>

    </nav>

    <div class="container mt-5">

        <h1 class="text-center mb-4">Your Cart</h1>

        <table class="table table-bordered text-center">

            <thead>
                <tr>
                    <th>Image</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody id="cartItems">

            </tbody>

        </table>

        <h4 class="text-end">Total: ₹<span id="cartTotal">0</span></h4>

        <div class="text-end mt-3">
            <a href="checkout.html" class="btn btn-primary">Proceed to Checkout</a>
        </div>

    </div>

    <footer>
        <p>© 2026 Aqua Store | All Rights Reserved</p>
    </footer>

    <script>

        const cart = JSON.parse(localStorage.getItem("cart")) || [];

        const cartItems = document.getElementById("cartItems");
        const cartTotal = document.getElementById("cartTotal");

        let totalAmount = 0;

        cart.forEach(product => {

            const quantity = 1;
            const price = parseInt(product.price.replace("₹", ""));
            const total = quantity * price;

            const row = document.createElement("tr");

            row.innerHTML = `
<td>
<img src="${product.image}" width="60">
</td>

<td>${product.title}</td>

<td>${quantity}</td>

<td>${product.price}</td>

<td>₹${total}</td>
`;

            cartItems.appendChild(row);

            totalAmount += total;

        });

        cartTotal.innerText = totalAmount;

    </script>

</body>

</html>
