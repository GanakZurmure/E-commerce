<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        $(document).ready(function () {

            $("#contactForm").submit(function (e) {

                let name = $("#name").val();
                let email = $("#email").val();
                let message = $("#message").val();

                if (name == "" || email == "" || message == "") {
                    alert("Please fill all fields");
                    e.preventDefault();
                }

                else {
                    alert("Form submitted successfully!");
                }

            });

        });
    </script>

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow">

        <a class="navbar-brand" href="index.html">Aqua Store</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="products.html">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="category.html">Category</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>

            </ul>

            <div class="search mr-3">
                <a href="search.html" class="btn btn-sm btn-outline-primary">
                    Search
                </a>
            </div>

            <div class="cart">
                <a href="cart.html">
                    <i class="fas fa-shopping-cart fa-1x text-dark"></i>
                </a>
            </div>

        </div>

    </nav>


    <div class="container mt-5">

        <h1 class="text-center mb-4">Contact Us</h1>

        <div class="row">

            <!-- Contact Info -->
            <div class="col-md-5">

                <h4>Contact Information</h4>

                <p><b>Email:</b> support@aquastore.com</p>
                <p><b>Phone:</b> +91 9876543210</p>
                <p><b>Location:</b> Nagpur, India</p>

            </div>


            <!-- Contact Form -->
            <div class="col-md-7">

                <form id="contactForm">

                    <div class="mb-3">
                        <input type="text" id="name" class="form-control" placeholder="Your Name">
                    </div>

                    <div class="mb-3">
                        <input type="email" id="email" class="form-control" placeholder="Your Email">
                    </div>

                    <div class="mb-3">
                        <textarea id="message" class="form-control" placeholder="Your Message"></textarea>
                    </div>

                    <button class="btn btn-primary">Submit</button>

                </form>

            </div>

        </div>

    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Aqua Store | All Rights Reserved</p>
    </footer>

</body>

</html>
